{% extends "base.html" %}

{% block title %}系统配置 - PDF 扫描器{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
{% endblock %}

{% block content %}
<div class="config-page-header">
    <h3 class="mb-0"><i class="bi bi-gear-fill me-2"></i>系统配置</h3>
    <button class="btn btn-primary" onclick="saveAll()">
        <i class="bi bi-save me-1"></i>保存全部
    </button>
</div>

<div class="row g-4" id="config-container">
    <!-- 左列 -->
    <div class="col-md-6">
        <div class="card config-card">
            <div class="card-header">
                <span><i class="bi bi-hdd-network me-2"></i>SMB 文件源</span>
                <button class="btn btn-sm btn-outline-primary" onclick="testSMB()">
                    <i class="bi bi-play-circle me-1"></i>测试连接
                </button>
            </div>
            <div class="card-body" id="smb-configs"></div>
            <div class="card-footer d-none" id="smb-result"></div>
        </div>

        <div class="card config-card">
            <div class="card-header">
                <span><i class="bi bi-cpu me-2"></i>AI 匹配引擎</span>
                <button class="btn btn-sm btn-outline-primary" onclick="testAI()">
                    <i class="bi bi-play-circle me-1"></i>测试连接
                </button>
            </div>
            <div class="card-body" id="ai-configs"></div>
            <div class="card-footer d-none" id="ai-result"></div>
        </div>
    </div>

    <!-- 右列 -->
    <div class="col-md-6">
        <div class="card config-card">
            <div class="card-header">
                <span><i class="bi bi-file-earmark-text me-2"></i>PaddleOCR 识别</span>
                <button class="btn btn-sm btn-outline-primary" onclick="testOCR()">
                    <i class="bi bi-play-circle me-1"></i>测试连接
                </button>
            </div>
            <div class="card-body" id="ocr-configs"></div>
            <div class="card-footer d-none" id="ocr-result"></div>
        </div>

        <div class="card config-card">
            <div class="card-header">
                <i class="bi bi-sliders me-2"></i>扫描参数
            </div>
            <div class="card-body" id="scan-configs"></div>
        </div>

        <div class="card config-card">
            <div class="card-header">
                <i class="bi bi-shield-lock me-2"></i>认证设置
            </div>
            <div class="card-body" id="auth-configs"></div>
        </div>

        <div class="card config-card">
            <div class="card-header">
                <span><i class="bi bi-database me-2"></i>数据库配置</span>
                <button class="btn btn-sm btn-outline-primary" onclick="testDB()">
                    <i class="bi bi-play-circle me-1"></i>测试连接
                </button>
            </div>
            <div class="card-body" id="db-configs"></div>
            <div class="card-footer d-none" id="db-result"></div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="saveToast" class="toast align-items-center text-bg-success" role="alert">
        <div class="d-flex">
            <div class="toast-body"><i class="bi bi-check-circle me-2"></i>配置已保存</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/settings.js') }}"></script>
{% endblock %}
