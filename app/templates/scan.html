{% extends "base.html" %}

{% block title %}扫描 - PDF 扫描器{% endblock %}

{% block content %}
<div id="notification-area"></div>

<ul class="nav nav-tabs mb-3" id="scanTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="smb-tab" data-bs-toggle="tab" data-bs-target="#smb" type="button" role="tab">
            <i class="bi bi-hdd-network me-1"></i>SMB 文件源
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="control-tab" data-bs-toggle="tab" data-bs-target="#control" type="button" role="tab">
            <i class="bi bi-play-circle me-1"></i>开始扫描
        </button>
    </li>
</ul>

<div class="tab-content" id="scanTabContent">
    <!-- SMB 文件源 -->
    <div class="tab-pane fade show active" id="smb" role="tabpanel">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-hdd-network me-2"></i>SMB 配置</span>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-primary" onclick="saveSMBConfig()">
                                <i class="bi bi-save me-1"></i>保存配置
                            </button>
                            <button class="btn btn-success" id="btn-mount" onclick="toggleMount()" type="button">
                                <i class="bi bi-plug me-1"></i><span id="btn-mount-text">手动挂载</span>
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">服务器地址</label>
                            <input type="text" class="form-control form-control-sm" id="smb-server" placeholder="192.168.0.79">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">共享路径</label>
                            <input type="text" class="form-control form-control-sm" id="smb-share" placeholder="abb/FS/10/D$/tbmdata/data/ftpdata">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">用户名</label>
                            <input type="text" class="form-control form-control-sm" id="smb-username" placeholder="">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">密码</label>
                            <input type="password" class="form-control form-control-sm" id="smb-password" placeholder="">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">域（可选）</label>
                            <input type="text" class="form-control form-control-sm" id="smb-domain" placeholder="">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">并发数</label>
                            <input type="number" class="form-control form-control-sm" id="scan-concurrency" placeholder="1" min="1" max="10">
                        </div>
                        <div class="mb-0">
                            <label class="form-label small fw-semibold">标准名称</label>
                            <input type="text" class="form-control form-control-sm" id="gbt-standard" placeholder="GBT 50378-2019(2024年版)">
                        </div>
                    </div>
                    <div class="card-footer bg-transparent">
                        <span id="smb-save-result" class="small"></span>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-folder me-2"></i>目录列表</span>
                        <div class="d-flex align-items-center gap-2">
                            <span id="smb-status-inline" class="small"></span>
                            <button class="btn btn-sm btn-outline-primary" onclick="testSMB(true)">
                                <i class="bi bi-arrow-clockwise me-1"></i>刷新
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0 d-flex flex-column">
                        <div id="smb-dirs-section" class="d-none flex-grow-1 d-flex flex-column">
                            <div class="px-3 pt-3 pb-2 d-flex justify-content-between align-items-center">
                                <h6 class="mb-0">按最新修改排序<small class="text-muted" id="smb-dirs-count"></small></h6>
                            </div>
                            <div class="table-responsive flex-grow-1" style="overflow-y: auto;">
                                <table class="table table-sm table-striped mb-0">
                                    <thead style="position: sticky; top: 0; background: white; z-index: 1;"><tr><th>目录名</th><th>修改时间</th><th>状态</th></tr></thead>
                                    <tbody id="smb-dirs"></tbody>
                                </table>
                            </div>
                            <div class="px-3 py-2 d-flex justify-content-between align-items-center border-top">
                                <span class="small text-muted" id="smb-page-info"></span>
                                <div class="btn-group btn-group-sm">
                                    <button class="btn btn-outline-secondary" id="smb-prev" onclick="loadSMBDirs(currentPage - 1)">上一页</button>
                                    <button class="btn btn-outline-secondary" id="smb-next" onclick="loadSMBDirs(currentPage + 1)">下一页</button>
                                </div>
                            </div>
                        </div>
                        <div id="smb-not-mounted" class="flex-grow-1 d-flex flex-column justify-content-center align-items-center text-muted">
                            <i class="bi bi-hdd-network fs-1"></i>
                            <p class="mt-2 mb-0">请先挂载 SMB 以查看目录列表</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 开始扫描 -->
    <div class="tab-pane fade" id="control" role="tabpanel">
        <div class="row">
            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-header">
                        <i class="bi bi-play-circle me-2"></i>扫描控制
                    </div>
                    <div class="card-body">
                        <div class="btn-group mb-3">
                            <button id="btn-start" class="btn btn-success" onclick="startScan()">
                                <i class="bi bi-play-fill me-1"></i>开始扫描
                            </button>
                            <button id="btn-pause" class="btn btn-warning" onclick="pauseScan()">
                                <i class="bi bi-pause-fill me-1"></i>暂停
                            </button>
                            <button id="btn-resume" class="btn btn-info" onclick="resumeScan()">
                                <i class="bi bi-arrow-clockwise me-1"></i>恢复
                            </button>
                            <button id="btn-reset" class="btn btn-danger" onclick="resetScan()">
                                <i class="bi bi-x-circle me-1"></i>重置
                            </button>
                        </div>

                        <h6>扫描进度</h6>
                        <div class="progress mb-2">
                            <div id="progress-bar" class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%">0%</div>
                        </div>
                        <p class="text-muted mb-1" id="current-file">当前文件：-</p>
                        <p class="text-muted mb-1" id="current-dir">当前目录：-</p>
                        <p class="text-muted" id="scan-status-text">状态：-</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header">
                        <i class="bi bi-speedometer2 me-2"></i>扫描统计
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="border rounded p-2 text-center">
                                    <div class="text-muted small">总目录</div>
                                    <div class="fs-4 fw-bold" id="total-dirs">-</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="border rounded p-2 text-center">
                                    <div class="text-muted small">总文件</div>
                                    <div class="fs-4 fw-bold" id="total-files">-</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="border rounded p-2 text-center">
                                    <div class="text-muted small">已扫描</div>
                                    <div class="fs-4 fw-bold text-primary" id="scanned-files">-</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="border rounded p-2 text-center">
                                    <div class="text-muted small">已匹配</div>
                                    <div class="fs-4 fw-bold text-success" id="matched-files">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-clock-history me-2"></i>扫描情况
                    </div>
                    <div class="card-body">
                        <div id="scan-situation">
                            <p class="text-muted small mb-1">临时库：<span id="temp-count">-</span></p>
                            <p class="text-muted small mb-1">正式库：<span id="formal-count">-</span></p>
                            <p class="text-muted small mb-1">已标记设计编号：<span id="cache-count">-</span></p>
                            <p class="text-muted small mb-0">当前设计编号：<span id="current-design">-</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let statusInterval;
let lastNotifiedStatus = null;

function updateStatus() {
    fetch('/api/scan/status')
        .then(r => r.json())
        .then(data => {
            document.getElementById('total-dirs').textContent = data.total_dirs || 0;
            document.getElementById('total-files').textContent = data.total_files || 0;
            document.getElementById('scanned-files').textContent = data.scanned_files || 0;
            document.getElementById('matched-files').textContent = data.matched_files || 0;

            const total = data.total_files || 0;
            const scanned = data.scanned_files || 0;
            let pct, barText;
            if (total === 0 && scanned === 0) {
                pct = 0;
                barText = '0%';
            } else if (total === 0 && scanned > 0) {
                pct = 0;
                barText = scanned + ' 个文件';
            } else {
                pct = Math.round((scanned / total) * 100);
                barText = pct + '%';
            }
            const bar = document.getElementById('progress-bar');
            bar.style.width = pct + '%';
            bar.textContent = barText;
            if (data.status === 'running') {
                bar.classList.add('progress-bar-animated');
            } else {
                bar.classList.remove('progress-bar-animated');
            }

            document.getElementById('current-file').textContent = '当前文件：' + (data.current_file || '-');
            document.getElementById('current-dir').textContent = '当前目录：' + (data.current_dir || '-');
            document.getElementById('scan-status-text').textContent = '状态：' + (data.status || 'idle');
            document.getElementById('current-design').textContent = data.current_design_number || '-';

            const status = data.status;
            document.getElementById('btn-start').disabled = status === 'running';
            document.getElementById('btn-pause').disabled = status !== 'running';
            document.getElementById('btn-resume').disabled = status !== 'paused';

            if (status === 'completed' && lastNotifiedStatus !== 'completed') {
                lastNotifiedStatus = 'completed';
                showNotification('扫描完成！共发现 ' + data.matched_files + ' 个匹配文件', 'success');
            } else if (status === 'running') {
                lastNotifiedStatus = 'running';
            } else if (status === 'idle') {
                lastNotifiedStatus = 'idle';
            }
        });

    fetch('/api/temp-files?size=1')
        .then(r => r.json())
        .then(data => {
            document.getElementById('temp-count').textContent = data.total || 0;
        });

    fetch('/api/files?size=1')
        .then(r => r.json())
        .then(data => {
            document.getElementById('formal-count').textContent = data.total || 0;
        });

    fetch('/api/design-cache?size=1')
        .then(r => r.json())
        .then(data => {
            document.getElementById('cache-count').textContent = data.total || 0;
        });
}

let smbConnected = false;

function checkSMBStatus() {
    const inline = document.getElementById('smb-status-inline');
    if (inline) inline.textContent = '检查中...';

    fetch('/api/config/smb-status')
        .then(r => r.json())
        .then(data => {
            if (data.mounted) {
                if (inline) {
                    inline.textContent = '已连接';
                    inline.className = 'small text-success';
                }
                smbConnected = true;
                updateMountButton(true);
                loadSMBDirs(1);
            } else {
                if (inline) {
                    inline.textContent = '未连接';
                    inline.className = 'small text-muted';
                }
                smbConnected = false;
                updateMountButton(false);
                document.getElementById('smb-dirs-section').classList.add('d-none');
                document.getElementById('smb-not-mounted').classList.remove('d-none');
            }
        })
        .catch(() => {
            if (inline) {
                inline.textContent = '未连接';
                inline.className = 'small text-muted';
            }
            smbConnected = false;
            updateMountButton(false);
            document.getElementById('smb-dirs-section').classList.add('d-none');
            document.getElementById('smb-not-mounted').classList.remove('d-none');
        });
}

function testSMB(forceRefresh) {
    const inline = document.getElementById('smb-status-inline');
    if (inline) inline.textContent = '检查中...';

    fetch('/api/config/test-smb', {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (inline) inline.textContent = '已连接';
                if (inline) inline.className = 'small text-success';
                if (!smbConnected || forceRefresh) {
                    loadSMBDirs(1);
                }
                smbConnected = true;
                updateMountButton(true);
            } else {
                if (inline) inline.textContent = data.message || '未连接';
                if (inline) inline.className = 'small text-muted';
                smbConnected = false;
                updateMountButton(false);
                document.getElementById('smb-dirs-section').classList.add('d-none');
                document.getElementById('smb-not-mounted').classList.remove('d-none');
            }
        })
        .catch(e => {
            if (inline) inline.textContent = '错误';
            if (inline) inline.className = 'small text-danger';
            smbConnected = false;
            updateMountButton(false);
            document.getElementById('smb-dirs-section').classList.add('d-none');
            document.getElementById('smb-not-mounted').classList.remove('d-none');
        });
}

let currentPage = 1;
let totalPages = 1;

function loadSMBDirs(page) {
    if (!page || page < 1) page = 1;
    currentPage = page;

    fetch('/api/browse?page=' + page + '&size=100')
        .then(r => r.json())
        .then(data => {
            const tbody = document.getElementById('smb-dirs');
            if (data.items) {
                tbody.innerHTML = data.items.map(d => {
                    const mtime = d.mtime ? new Date(d.mtime * 1000).toLocaleString() : '-';
                    let statusBadge = '';
                    if (d.status === 'completed') {
                        statusBadge = '<span class="badge bg-success">已完成</span>';
                    } else if (d.status === 'scanning') {
                        statusBadge = '<span class="badge bg-warning text-dark">扫描中</span>';
                    } else {
                        statusBadge = '<span class="badge bg-secondary">待扫描</span>';
                    }
                    return '<tr><td>' + escapeHtml(d.name) + '</td><td>' + mtime + '</td><td>' + statusBadge + '</td></tr>';
                }).join('');
                document.getElementById('smb-dirs-section').classList.remove('d-none');
                document.getElementById('smb-not-mounted').classList.add('d-none');
                document.getElementById('smb-dirs-count').textContent = ' 共 ' + (data.total || 0) + ' 个';

                totalPages = Math.ceil((data.total || 0) / 100);
                document.getElementById('smb-page-info').textContent = '第 ' + page + ' / ' + totalPages + ' 页';
                document.getElementById('smb-prev').disabled = page <= 1;
                document.getElementById('smb-next').disabled = page >= totalPages;
            }
        })
        .catch(() => {
            document.getElementById('smb-dirs-section').classList.add('d-none');
            document.getElementById('smb-not-mounted').classList.remove('d-none');
        });
}

function loadSMBForm() {
    fetch('/api/config')
        .then(r => r.json())
        .then(data => {
            const configs = {};
            data.configs.forEach(c => configs[c.key] = c.value || '');
            document.getElementById('smb-server').value = configs['smb_server'] || '';
            document.getElementById('smb-share').value = configs['smb_share'] || '';
            document.getElementById('smb-username').value = configs['smb_username'] || '';
            document.getElementById('smb-password').value = configs['smb_password'] || '';
            document.getElementById('smb-domain').value = configs['smb_domain'] || '';
            document.getElementById('scan-concurrency').value = configs['scan_concurrency'] || '1';
            document.getElementById('gbt-standard').value = configs['gbt_standard'] || '';
        });
}

function saveSMBConfig() {
    const keys = ['smb_server', 'smb_share', 'smb_username', 'smb_password', 'smb_domain', 'scan_concurrency', 'gbt_standard'];
    const ids = ['smb-server', 'smb-share', 'smb-username', 'smb-password', 'smb-domain', 'scan-concurrency', 'gbt-standard'];
    const promises = keys.map((key, i) => {
        const value = document.getElementById(ids[i]).value;
        return fetch('/api/config/' + key, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({value}),
        });
    });
    Promise.all(promises).then(() => {
        const span = document.getElementById('smb-save-result');
        span.textContent = '已保存';
        span.className = 'ms-2 small text-success';
        setTimeout(() => { span.textContent = ''; }, 2000);
    }).catch(() => {
        const span = document.getElementById('smb-save-result');
        span.textContent = '保存失败';
        span.className = 'ms-2 small text-danger';
    });
}

function updateMountButton(mounted) {
    const btn = document.getElementById('btn-mount');
    const txt = document.getElementById('btn-mount-text');
    if (mounted) {
        btn.className = 'btn btn-warning';
        txt.textContent = '卸载';
    } else {
        btn.className = 'btn btn-success';
        txt.textContent = '手动挂载';
    }
}

function toggleMount() {
    const inline = document.getElementById('smb-status-inline');
    const isMounted = document.getElementById('btn-mount-text').textContent === '卸载';
    if (inline) inline.textContent = isMounted ? '卸载中...' : '挂载中...';

    fetch('/api/config/test-smb', {method: 'POST'})
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(data => {
            console.log('toggleMount response:', data);
            if (data.success) {
                if (inline) {
                    inline.textContent = '已连接';
                    inline.className = 'small text-success';
                }
                smbConnected = true;
                updateMountButton(true);
                loadSMBDirs(1);
            } else {
                if (inline) {
                    inline.textContent = data.message || '未连接';
                    inline.className = 'small text-muted';
                }
                smbConnected = false;
                updateMountButton(false);
                document.getElementById('smb-dirs-section').classList.add('d-none');
                document.getElementById('smb-not-mounted').classList.remove('d-none');
            }
        })
        .catch(e => {
            console.error('toggleMount error:', e);
            if (inline) {
                inline.textContent = '错误: ' + e.message;
                inline.className = 'small text-danger';
            }
            smbConnected = false;
            updateMountButton(false);
            document.getElementById('smb-dirs-section').classList.add('d-none');
            document.getElementById('smb-not-mounted').classList.remove('d-none');
        });
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function startScan() {
    fetch('/api/scan/start', {method: 'POST'}).then(() => updateStatus());
}

function pauseScan() {
    fetch('/api/scan/pause', {method: 'POST'}).then(() => updateStatus());
}

function resumeScan() {
    fetch('/api/scan/resume', {method: 'POST'}).then(() => updateStatus());
}

function resetScan() {
    if (!confirm('确定重置扫描进度？')) return;
    fetch('/api/scan/reset', {method: 'POST'}).then(() => updateStatus());
}

function showNotification(msg, type) {
    const area = document.getElementById('notification-area');
    const div = document.createElement('div');
    div.className = 'alert alert-' + type + ' alert-dismissible fade show';
    div.textContent = msg;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn-close';
    btn.setAttribute('data-bs-dismiss', 'alert');
    div.appendChild(btn);
    area.appendChild(div);
}

// Tab 切换时加载对应内容
document.getElementById('smb-tab').addEventListener('shown.bs.tab', function() {
    loadSMBForm();
    checkSMBStatus();
});
document.getElementById('control-tab').addEventListener('shown.bs.tab', updateStatus);

// 初始加载
loadSMBForm();
checkSMBStatus();
updateStatus();
statusInterval = setInterval(updateStatus, 3000);
</script>
{% endblock %}
