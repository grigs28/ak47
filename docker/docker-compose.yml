version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-web:latest
    ports:
      - "5556:5556"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=ak47-secret-change-me
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=192.168.0.98
      - DB_PORT=5432
      - DB_NAME=ak47
      - DB_USER=grigs
      - DB_PASSWORD=Slnwg123$
      - ADMIN_USERS=grigs
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse
    depends_on:
      - redis
    command: web
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-worker:latest
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=ak47-secret-change-me
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=192.168.0.98
      - DB_PORT=5432
      - DB_NAME=ak47
      - DB_USER=grigs
      - DB_PASSWORD=Slnwg123$
      - ADMIN_USERS=grigs
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse
    depends_on:
      - redis
    command: worker
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
